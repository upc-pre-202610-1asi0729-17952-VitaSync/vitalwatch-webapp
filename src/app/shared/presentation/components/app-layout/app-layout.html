<div class="app-shell">
  <div class="desktop-sidebar">
    <app-sidebar
      [profile]="profile()"
      [menuTitle]="config().menuTitle"
      [menuItems]="config().menuItems"
      (signOut)="signOut()" />
  </div>

  <button
    type="button"
    class="mobile-sidebar-backdrop"
    [class.open]="isMobileSidebarOpen()"
    aria-label="Cerrar menú"
    (click)="closeMobileSidebar()">
  </button>

  <div
    class="mobile-sidebar-panel"
    [class.open]="isMobileSidebarOpen()"
    (click)="closeMobileSidebar()">
    <app-sidebar
      [profile]="profile()"
      [menuTitle]="config().menuTitle"
      [menuItems]="config().menuItems"
      (signOut)="signOut()" />
  </div>

  <main class="main-shell">
    <app-topbar (menuToggle)="toggleMobileSidebar()" />

    <section class="page-content">
      <router-outlet />
    </section>
  </main>
</div>

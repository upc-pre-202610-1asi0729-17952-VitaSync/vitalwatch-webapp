<div class="auth-shell">
  <section class="brand-panel">
    <div class="brand-content">
      <div class="brand">
        <img src="/logo.ico" alt="VitalWatch logo">
        <span>{{ 'app.name' | translate }}</span>
      </div>

      <div class="brand-copy">
        <h1>
          {{ (variant === 'register' ? 'auth.register-brand-title' : 'auth.brand-title') | translate }}
        </h1>
        <p>
          {{ (variant === 'register' ? 'auth.register-brand-description' : 'auth.brand-description') | translate }}
        </p>
      </div>
    </div>
  </section>

  <section class="form-panel">
    <div class="language-switcher-wrapper">
      <app-language-switcher />
    </div>

    <div class="form-content">
      <ng-content />
    </div>
  </section>
</div>

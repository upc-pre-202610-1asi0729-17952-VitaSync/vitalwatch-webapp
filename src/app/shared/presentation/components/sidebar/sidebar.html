<aside class="sidebar">
    <div class="brand-section">
        <img src="/logo.ico" alt="VitalWatch logo" class="brand-logo">

        <div>
            <h1>{{ 'app.name' | translate }}</h1>
        </div>
    </div>

    <div class="profile-section">
        <div class="avatar" [style.background]="profile.avatarColor">
            {{ profile.initials }}
        </div>

        <div class="profile-info">
            <h2>{{ profile.fullName }}</h2>
            <p>{{ profile.email }}</p>
        </div>
    </div>

    <nav class="navigation">
        <p class="menu-title">{{ menuTitle | translate }}</p>

        @for (item of menuItems; track item.link) {
        <a class="nav-item" [routerLink]="item.link" routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
            <ng-icon [name]="item.icon" />
            <span>{{ item.label | translate }}</span>
        </a>
        }
    </nav>

    <button type="button" class="sign-out-button" (click)="signOut.emit()">
        <ng-icon name="heroArrowLeftOnRectangle" />
        <span>{{ 'navigation.sign-out' | translate }}</span>
    </button>
</aside>

<section class="result-page">
    <article class="result-card">
        <div class="result-icon success">
            <ng-icon name="heroCheckCircle" />
        </div>

        <h1>{{ 'subscription.checkoutSuccess.title' | translate }}</h1>

        <p>
            {{ 'subscription.checkoutSuccess.subtitle' | translate }}
        </p>

        @if (checkingPayment()) {
        <p>Validando el pago con Stripe...</p>
        }

        @if (activationMessage()) {
        <p class="form-success">{{ activationMessage() }}</p>
        }

        @if (activationError()) {
        <p class="form-error">{{ activationError() }}</p>
        }

        <button type="button" class="primary-button" (click)="goToSignIn()">
            {{ 'subscription.checkoutSuccess.go-login' | translate }}
        </button>
    </article>
</section>

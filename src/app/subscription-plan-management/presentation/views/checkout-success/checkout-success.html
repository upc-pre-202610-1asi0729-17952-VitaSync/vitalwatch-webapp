<div class="checkout-result-page">
  <div class="checkout-result-card">
    <div class="checkout-result-icon success">
      <span>✓</span>
    </div>

    <h1 class="checkout-result-title">
      {{ 'subscription.checkoutSuccess.title' | translate }}
    </h1>

    <p class="checkout-result-subtitle">
      {{ 'subscription.checkoutSuccess.subtitle' | translate }}
    </p>

    <p class="checkout-result-message">
      {{ 'subscription.checkoutSuccess.message' | translate }}
    </p>

    <button
      type="button"
      class="checkout-result-button success"
      (click)="goToLogin()">
      {{ 'subscription.checkoutSuccess.go-login' | translate }}
    </button>
  </div>
</div>
